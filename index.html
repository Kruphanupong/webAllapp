<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <title>📚ระบบดาวน์โหลดโปรแกรมทางการศึกษา</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gradient-to-r from-blue-50 to-indigo-100 min-h-screen flex flex-col items-center p-6">

  <!-- หัวข้อ -->
  <h1 class="text-3xl font-bold mb-8 text-gray-800">
    📚 ระบบดาวน์โหลดโปรแกรมทางการศึกษา
  </h1>

  <!-- Grid -->
  <div class="grid grid-cols-1 md:grid-cols-3 gap-6 w-full max-w-5xl">

    <!-- โหลดฟรีไม่มีค่าใช้จ่าย -->
    <div class="bg-white p-6 rounded-2xl shadow-lg hover:shadow-2xl transition">
      
      <div class="text-4xl mb-3">🎓</div>

      <h2 class="text-xl font-bold mb-2">โหลดฟรีไม่มีค่าใช้จ่าย</h2>
      
      <p class="text-gray-500 text-sm mb-4">
        คลิกลิ้งด่านล่าง
      </p>

      <a href="https://script.google.com/macros/s/AKfycbyB8UDA6rvFmP3GyWjJlQcOmGGEKtB1xs21n5izuxfeb55vMGrq4SqkK_mmE4HfGqPMPA/exec"
         target="_blank"
         class="block text-center bg-blue-500 hover:bg-blue-600 text-white px-4 py-2 rounded-lg transition">
         🚀 เข้าใช้งาน
      </a>

    </div>

    <!-- เพิ่มระบบอื่นในอนาคต -->
    <div class="bg-white p-6 rounded-2xl shadow border-dashed border-2 flex items-center justify-center text-gray-400">
      + เพิ่มระบบใหม่
    </div>

  </div>

</body>
</html>
